<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura - Tome 2</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .slide { width: 100%; max-width: 800px; background: #121212; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .btn { background: #ff007f; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; cursor: pointer; border: none; }
        .btn:hover { background: #ff3399; }
        img { width: 100%; border-radius: 10px; }
        
        /* Style du lecteur audio */
        #music-container { position: fixed; top: 10px; right: 10px; z-index: 1000; background: #121212; padding: 10px; border-radius: 20px; border: 1px solid #ff007f; }
    </style>
</head>
<body>

    <!-- Lecteur Audio -->
    <div id="music-container">
        <audio id="bg-audio" loop>
            <source src="Neon Horizon.mp3" type="audio/mpeg">
        </audio>
        <button id="music-btn" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold;">Musique : OFF</button>
    </div>

    <!-- Contenu du Tome 2 -->
    <div class="slide" id="t2-p1">
        <h1>TOME 2 - Page 1</h1>
        <img src="page 1 tome 2 hol.png"><br>
        <a href="#t2-p2" class="btn">Suivant</a>
    </div>

    <div class="slide" id="t2-p2">
        <h1>TOME 2 - Page 2</h1>
        <img src="page 2 tome 2 hol.png"><br>
        <a href="index.html" class="btn">Retour Accueil</a>
    </div>

    <!-- Ajoute tes autres pages ici en suivant le même modèle -->

    <script>
        const audio = document.getElementById("bg-audio");
        const btn = document.getElementById("music-btn");

        btn.addEventListener("click", () => {
            if (audio.paused) {
                audio.play();
                btn.textContent = "Musique : ON";
            } else {
                audio.pause();
                btn.textContent = "Musique : OFF";
            }
        });
    </script>
</body>
</html>
