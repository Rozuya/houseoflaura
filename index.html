<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura - Manga Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Kanit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #080110;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 0, 127, 0.08) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(142, 68, 173, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 0;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
        }
        .slide-container {
            width: 100%;
            max-width: 900px;
            height: auto;
            min-height: 600px;
            background-color: #110520;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.25);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
            border: 2px solid rgba(255, 0, 127, 0.6);
            padding: 20px;
        }
        .nav-overlay { margin-top: 20px; margin-bottom: 10px; text-align: center; width: 100%; }
        .btn-next {
            background: linear-gradient(45deg, #ff007f, #b90064);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn-next:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 0, 127, 0.9); }
        .manga-page { width: 100%; display: flex; justify-content: center; align-items: center; }
        .manga-page img { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); }
        .soon-title { font-family: 'Kanit', sans-serif; font-size: 90px; font-weight: 900; color: #ff007f; text-shadow: 0 0 20px #ff007f; margin: 0; text-transform: uppercase; letter-spacing: 12px; }
        .soon-subtitle { font-size: 22px; font-weight: 600; color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); letter-spacing: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="slide-container" id="cover">
        <div class="manga-page"><img src="https://images.exemplar.ai/image_e84c41.jpg" alt="Couverture"></div>
        <div class="nav-overlay"><a href="#page1" class="btn-next">Commencer <i class="fas fa-arrow-right"></i></a></div>
    </div>
    <div class="slide-container" id="page1">
        <div class="manga-page"><img src="https://images.exemplar.ai/image_e84c5a.jpg" alt="Page 1"></div>
        <div class="nav-overlay"><a href="#page2" class="btn-next">Suivant <i class="fas fa-arrow-right"></i></a></div>
    </div>
    <div class="slide-container" id="page2">
        <div class="manga-page"><img src="https://images.exemplar.ai/image_e84c77.jpg" alt="Page 2"></div>
        <div class="nav-overlay"><a href="#page3" class="btn-next">Suivant <i class="fas fa-arrow-right"></i></a></div>
    </div>
    <div class="slide-container" id="page3">
        <div class="manga-page"><img src="https://images.exemplar.ai/image_e84f21.jpg" alt="Page 3"></div>
        <div class="nav-overlay"><a href="#soon" class="btn-next">Suivant <i class="fas fa-arrow-right"></i></a></div>
    </div>
    <div class="slide-container" id="soon">
        <div class="manga-page" style="flex-direction: column; padding: 40px 0;">
            <h2 class="soon-title">SOON</h2>
            <p class="soon-subtitle">LA SUITE ARRIVE BIENTÔT</p>
        </div>
        <div class="nav-overlay"><a href="#cover" class="btn-next">Relire</a></div>
    </div>
</body>
</html>
