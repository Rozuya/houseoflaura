<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura - Manga Reader</title>

    <!-- METADONNÉES -->
    <meta property="og:title" content="House of Laura - Manga Reader">
    <meta property="og:description" content="Découvrez le manga House of Laura en ligne !">
    <!-- Le lien vers l'image avec %20 pour respecter le nom de fichier -->
    <meta property="og:image" content="https://rozuya.github.io/houseoflaura/cover%20hol.png">
    <meta property="og:url" content="https://rozuya.github.io/houseoflaura/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Kanit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #080110; color: #ffffff; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 40px 0; }
        .slide-container { width: 100%; max-width: 900px; min-height: 600px; background-color: #110520; border-radius: 16px; border: 2px solid rgba(255, 0, 127, 0.6); padding: 20px; display: flex; flex-direction: column; align-items: center; margin-bottom: 60px; }
        .nav-overlay { margin-top: 20px; }
        .btn-next { background: linear-gradient(45deg, #ff007f, #b90064); color: white; padding: 14px 45px; border-radius: 50px; text-decoration: none; font-weight: bold; cursor: pointer; }
        .manga-page img { max-width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>
    <div class="slide-container" id="cover">
        <!-- Appel direct du fichier original -->
        <div class="manga-page"><img src="cover hol.png" alt="Couverture"></div>
        <div class="nav-overlay"><a href="#page1" class="btn-next">Commencer</a></div>
    </div>
    
    <div class="slide-container" id="page1">
        <div class="manga-page"><img src="page 1 hol.png" alt="Page 1"></div>
        <div class="nav-overlay"><a href="#page2" class="btn-next">Suivant</a></div>
    </div>

    <div class="slide-container" id="page2">
        <div class="manga-page"><img src="page 2 hol.png" alt="Page 2"></div>
        <div class="nav-overlay"><a href="#page3" class="btn-next">Suivant</a></div>
    </div>

    <div class="slide-container" id="page3">
        <div class="manga-page"><img src="page 3 hol.png" alt="Page 3"></div>
        <div class="nav-overlay"><a href="#soon" class="btn-next">Suivant</a></div>
    </div>
</body>
</html>
